name: Auto-ImmortalWrt-x86_64-智能自动编译发布

on:
  workflow_dispatch:
    inputs:
      # ====== 基础设定 (3个) ======
      luci_version:
        description: "选择版本 (Auto 抓取最新稳定版/RC版)"
        required: false
        default: "Auto"
        type: choice
        options: [ 'Auto', '24.10.5', '25.12.0-rc1' ]
      custom_router_ip:
        description: "设置管理地址"
        required: true
        default: "192.168.100.1"
      rootfs_size:
        description: 'RootFS 分区大小 (MB)'
        required: true
        default: '1024'
        
      # ====== 核心网络与存储 (5个) ======
      include_docker:
        description: "🐳 集成 Docker 引擎及网络互通"
        type: boolean
        default: true
      app_homeproxy:
        description: "🛡️ 集成 HomeProxy (全能科学代理)"
        type: boolean
        default: true
      app_openclash:
        description: "🔌 集成 OpenClash (科学插件)"
        type: boolean
        default: true
      theme_argon:
        description: "🎨 集成 Argon 主题 (仅主题无控制面板)"
        type: boolean
        default: true
      app_ksmbd:
        description: "📁 集成 KSMBD (局域网极速共享)"
        type: boolean
        default: true

      # ====== 常用扩展工具 (12个) ======
      app_adguardhome:
        description: "🛑 集成 AdGuardHome (全网去广告)"
        type: boolean
        default: false
      app_alist:
        description: "🗂️ 集成 AList (多存储网盘挂载)"
        type: boolean
        default: false
      app_ttyd:
        description: "📟 集成 TTYD (Web 终端控制台)"
        type: boolean
        default: true
      app_upnp:
        description: "🎮 集成 UPnP (自动端口映射)"
        type: boolean
        default: true
      app_wol:
        description: "💻 集成 WOL (网络唤醒)"
        type: boolean
        default: true
      app_autoreboot:
        description: "⏱️ 集成 AutoReboot (定时重启)"
        type: boolean
        default: true
      app_statistics:
        description: "📊 集成 Statistics (图形化状态监控)"
        type: boolean
        default: true
      app_sqm:
        description: "🚦 集成 SQM QoS (防网络拥塞稳定Ping)"
        type: boolean
        default: false
      app_wireguard:
        description: "🛡️ 集成 WireGuard (轻量级 VPN)"
        type: boolean
        default: false
      app_tailscale:
        description: "🕸️ 集成 Tailscale (异地 Mesh 组网)"
        type: boolean
        default: false
      app_zerotier:
        description: "🌍 集成 ZeroTier (虚拟局域网)"
        type: boolean
        default: false
      app_frpc:
        description: "🚇 集成 FRP 客户端 (内网穿透)"
        type: boolean
        default: false

      # ====== 独立实体网卡驱动 (5个) ======
      kmod_igc:
        description: "🔌 驱动: Intel i225/i226 (2.5G)"
        type: boolean
        default: true
      kmod_ixgbe:
        description: "🔌 驱动: Intel 10G (万兆)"
        type: boolean
        default: false
      kmod_e1000e:
        description: "🔌 驱动: Intel 千兆"
        type: boolean
        default: false
      kmod_r8169:
        description: "🔌 驱动: Realtek 瑞昱千兆"
        type: boolean
        default: false
      kmod_r8125:
        description: "🔌 驱动: Realtek 瑞昱 2.5G"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      INPUT_VERSION: ${{ github.event.inputs.luci_version }}
      INPUT_IP: ${{ github.event.inputs.custom_router_ip }}
      INPUT_ROOTFS: ${{ github.event.inputs.rootfs_size }}
      
      # 映射所有选项
      INPUT_DOCKER: ${{ github.event.inputs.include_docker }}
      INPUT_APP_HOMEPROXY: ${{ github.event.inputs.app_homeproxy }}
      INPUT_APP_OPENCLASH: ${{ github.event.inputs.app_openclash }}
      INPUT_THEME_ARGON: ${{ github.event.inputs.theme_argon }}
      INPUT_APP_KSMBD: ${{ github.event.inputs.app_ksmbd }}
      INPUT_APP_ADGUARDHOME: ${{ github.event.inputs.app_adguardhome }}
      INPUT_APP_ALIST: ${{ github.event.inputs.app_alist }}
      INPUT_APP_TTYD: ${{ github.event.inputs.app_ttyd }}
      INPUT_APP_UPNP: ${{ github.event.inputs.app_upnp }}
      INPUT_APP_WOL: ${{ github.event.inputs.app_wol }}
      INPUT_APP_AUTOREBOOT: ${{ github.event.inputs.app_autoreboot }}
      INPUT_APP_STATISTICS: ${{ github.event.inputs.app_statistics }}
      INPUT_APP_SQM: ${{ github.event.inputs.app_sqm }}
      INPUT_APP_WIREGUARD: ${{ github.event.inputs.app_wireguard }}
      INPUT_APP_TAILSCALE: ${{ github.event.inputs.app_tailscale }}
      INPUT_APP_ZEROTIER: ${{ github.event.inputs.app_zerotier }}
      INPUT_APP_FRPC: ${{ github.event.inputs.app_frpc }}
      INPUT_KMOD_IGC: ${{ github.event.inputs.kmod_igc }}
      INPUT_KMOD_IXGBE: ${{ github.event.inputs.kmod_ixgbe }}
      INPUT_KMOD_E1000E: ${{ github.event.inputs.kmod_e1000e }}
      INPUT_KMOD_R8169: ${{ github.event.inputs.kmod_r8169 }}
      INPUT_KMOD_R8125: ${{ github.event.inputs.kmod_r8125 }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set executable permissions
        run: |
          sed -i 's/\r$//' ${{ github.workspace }}/x86-64/auto-build-script.sh
          chmod +x ${{ github.workspace }}/x86-64/auto-build-script.sh

      - name: Generate build timestamp
        id: date
        run: echo "DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: 🔍 解析 Auto 版本号
        id: resolve_version
        run: |
          if [ "$INPUT_VERSION" == "Auto" ]; then
            LATEST_TAG=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100&name=x86-64-openwrt-" | jq -r '.results[].name' | grep -v "SNAPSHOT" | grep -vE "^x86-64-openwrt-[0-9]+\.[0-9]+$" | head -n 1 | sed 's/x86-64-openwrt-//')
            echo "FINAL_VERSION=$LATEST_TAG" >> $GITHUB_ENV
          else
            echo "FINAL_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
          fi

      - name: Build ImmortalWrt-x86-64-efi
        run: |
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/auto-build-script.sh:/home/build/immortalwrt/build.sh" \
            -e CUSTOM_IP="$INPUT_IP" \
            -e ROOTFS_SIZE="$INPUT_ROOTFS" \
            -e INCLUDE_DOCKER="$INPUT_DOCKER" \
            -e APP_HOMEPROXY="$INPUT_APP_HOMEPROXY" \
            -e APP_OPENCLASH="$INPUT_APP_OPENCLASH" \
            -e THEME_ARGON="$INPUT_THEME_ARGON" \
            -e APP_KSMBD="$INPUT_APP_KSMBD" \
            -e APP_ADGUARDHOME="$INPUT_APP_ADGUARDHOME" \
            -e APP_ALIST="$INPUT_APP_ALIST" \
            -e APP_TTYD="$INPUT_APP_TTYD" \
            -e APP_UPNP="$INPUT_APP_UPNP" \
            -e APP_WOL="$INPUT_APP_WOL" \
            -e APP_AUTOREBOOT="$INPUT_APP_AUTOREBOOT" \
            -e APP_STATISTICS="$INPUT_APP_STATISTICS" \
            -e APP_SQM="$INPUT_APP_SQM" \
            -e APP_WIREGUARD="$INPUT_APP_WIREGUARD" \
            -e APP_TAILSCALE="$INPUT_APP_TAILSCALE" \
            -e APP_ZEROTIER="$INPUT_APP_ZEROTIER" \
            -e APP_FRPC="$INPUT_APP_FRPC" \
            -e KMOD_IGC="$INPUT_KMOD_IGC" \
            -e KMOD_IXGBE="$INPUT_KMOD_IXGBE" \
            -e KMOD_E1000E="$INPUT_KMOD_E1000E" \
            -e KMOD_R8169="$INPUT_KMOD_R8169" \
            -e KMOD_R8125="$INPUT_KMOD_R8125" \
            immortalwrt/imagebuilder:x86-64-openwrt-${{ env.FINAL_VERSION }} /bin/bash /home/build/immortalwrt/build.sh
          
      - name: Generate Smart Release Notes
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 🚀 ImmortalWrt ${{ env.FINAL_VERSION }} 智能定制满配版
          
          ## 📡 网络后台
          - 🏠 **管理地址**: \`$INPUT_IP\`
          - 👤 **默认账户**: \`root\`
          - 🔑 **默认密码**: *(无，请在初始设置时修改)*
          - 🌐 **上网方式**: DHCP / 静态 IP
          
          > 💡 **系统底层已预置增强包 (无需配置即刻生效)**: 
          > \`irqbalance\`(多核性能优化)、\`zram-swap\`(防爆内存扩展)、\`iperf3\`(局域网极限测速)、\`kmod-virtio-net\`(PVE/KVM 驱动)、\`kmod-vmxnet3\`(ESXi 驱动) 以及必备命令行工具。
          EOF

      - name: Upload ImmortWrt as release assets
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: Build-${{ env.DATE }}
          name: ImmortalWrt ${{ env.FINAL_VERSION }} 定制版 (${{ github.event.inputs.custom_router_ip }})
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*-ext4-combined-efi.img.gz
            ${{ github.workspace }}/bin/targets/x86/64/*-squashfs-combined-efi.img.gz
            ${{ github.workspace }}/bin/targets/x86/64/*sha256sums
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
