name: ImmortalWrt-x86-64-mix

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: '选择构建版本 (Docker Tag)'
        required: true
        default: '25.12.0-rc1'
        type: choice
        options:
          - '25.12.0-rc1'
          - '24.10.5'
          - '23.05.4'
      profile:
        description: 'RootFS 分区大小 (MB)'
        required: true
        default: '1024'
        type: string
      custom_ip:
        description: '路由器管理地址'
        required: true
        default: '192.168.100.1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 🐳 准备极简输出目录
        run: |
          # 直接在当前工作区建一个简单粗暴的输出文件夹
          mkdir -p ${{ github.workspace }}/output-firmware
          
          # 🔥 关键神操作：赋予最高读写权限，允许 Docker 内部的非 root 用户写入
          chmod 777 ${{ github.workspace }}/output-firmware
          
          # 修复脚本换行符并赋予权限
          sed -i 's/\r$//' x86-64/build_ImmortalWrt_mix.sh
          chmod +x x86-64/build_ImmortalWrt_mix.sh

      - name: 🚀 运行 Docker ImageBuilder 容器
        run: |
          DOCKER_IMAGE="immortalwrt/imagebuilder:x86-64-openwrt-${{ inputs.openwrt_version }}"
          echo ">>> 正在拉取官方构建镜像: $DOCKER_IMAGE"
          docker pull "$DOCKER_IMAGE"
          
          echo ">>> 启动容器并在无尘环境中执行编译..."
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e ROOTFS_SIZE=${{ inputs.profile }} \
            -e MANAGEMENT_IP=${{ inputs.custom_ip }} \
            "$DOCKER_IMAGE" \
            /bin/bash -c "cp /workspace/x86-64/build_ImmortalWrt_mix.sh . && \
            ./build_ImmortalWrt_mix.sh && \
            echo '>>> 🎯 编译成功！当前容器生成的文件如下：' && \
            ls -lh bin/targets/x86/64/ && \
            echo '>>> 正在将所有固件文件转移到宿主机 output-firmware 目录...' && \
            cp bin/targets/x86/64/* /workspace/output-firmware/ -r"

      - name: 📦 Upload ImmortalWrt as release assets
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: ${{ inputs.openwrt_version }}-${{ github.run_id }}
          name: ImmortalWrt ${{ inputs.openwrt_version }} [${{ inputs.custom_ip }}]
          # 这里采用“全量通配”，只要是放到输出文件夹里的文件全抓取
          files: |
            output-firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
