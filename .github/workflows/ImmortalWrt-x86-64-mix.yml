name: ImmortalWrt-x86-64-mix

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'ImmortalWrt 版本(latest智能选择最新稳定版)'
        required: true
        default: 'latest'
        type: string # 改为 string 方便手动输入
      profile:
        description: 'RootFS 分区大小 (单位: MB)'
        required: true
        default: '1024'
        type: string
      custom_ip:
        description: '路由器管理地址'
        required: true
        default: '192.168.100.1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 🌟 智能获取 ImmortalWrt 版本号
        id: get_version
        run: |
          if [ "${{ inputs.openwrt_version }}" == "latest" ]; then
            LATEST_VER=$(curl -s "https://api.github.com/repos/immortalwrt/immortalwrt/releases" | grep '"tag_name":' | grep -v 'rc' | head -n 1 | cut -d '"' -f 4 | sed 's/v//')
            echo "OWRT_VERSION=$LATEST_VER" >> $GITHUB_ENV
          else
            echo "OWRT_VERSION=${{ inputs.openwrt_version }}" >> $GITHUB_ENV
          fi

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip bzip2 patch python3 findutils zstd

      - name: 下载并解压 ImageBuilder
        run: |
          # 动态拼接 ImmortalWrt 的下载地址
          IB_URL="https://downloads.immortalwrt.org/releases/${{ env.OWRT_VERSION }}/targets/x86/64/immortalwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64.tar.xz"
          echo ">>> 正在下载: $IB_URL"
          wget -q "$IB_URL" || (echo "下载失败，请检查版本号是否正确" && exit 1)
          tar -xf *.tar.xz
          mv immortalwrt-imagebuilder-* imagebuilder

      - name: 运行定制脚本
        env:
          ROOTFS_SIZE: ${{ inputs.profile }}
          MANAGEMENT_IP: ${{ inputs.custom_ip }}
        run: |
          # 确保脚本存在并赋予权限
          sed -i 's/\r$//' x86-64/build251.sh
          chmod +x x86-64/build251.sh
          cp x86-64/build251.sh imagebuilder/
          cd imagebuilder
          ./build251.sh

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}-${{ env.OWRT_VERSION }}
          name: ImmortalWrt ${{ env.OWRT_VERSION }} [${{ inputs.custom_ip }}]
          files: imagebuilder/output-firmware/*
          body: |
            **🎉 ImmortalWrt ${{ env.OWRT_VERSION }} 定制版**
            - 🏠 管理地址: `http://${{ inputs.custom_ip }}`
            - 🚀 插件: OpenClash (Meta Core), Argon Theme
            - 📊 存储: 自动挂载 sda3 扩展分区
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
