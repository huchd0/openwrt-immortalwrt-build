name: build-x86-64-immortalwrt-auto

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择版本 (输入 auto 则自动获取最新版)"
        required: false
        default: "auto"
      custom_router_ip:
        description: "路由器 LAN 口管理地址"
        required: true
        default: "192.168.100.1"
      profile:
        description: '固件分区大小 (MB)'
        required: true
        default: '1024'

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Shanghai
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Get Latest Version Tag
        id: get_tag
        run: |
          if [ "${{ github.event.inputs.luci_version }}" = "auto" ]; then
            echo "正在从 Docker Hub 获取最新版本标签..."
            # 获取标签列表，筛选出符合 x86-64-openwrt-数字.数字 格式的标签，并取最高版本
            LATEST_TAG=$(curl -s "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags/?page_size=100" | \
              jq -r '.results[].name' | \
              grep -E '^x86-64-openwrt-[0-9]+\.[0-9]+' | \
              sort -V | tail -n 1)
            
            # 提取版本号部分 (例如从 x86-64-openwrt-25.12.0-rc1 提取 25.12.0-rc1)
            FINAL_VERSION=$(echo $LATEST_TAG | sed 's/x86-64-openwrt-//')
          else
            FINAL_VERSION="${{ github.event.inputs.luci_version }}"
          fi
          
          echo "确定使用的 Luci 版本为: $FINAL_VERSION"
          echo "LUCI_VERSION=$FINAL_VERSION" >> $GITHUB_ENV

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build25.sh

      - name: Build ImmortalWrt-x86-64
        run: |
          echo "🚀 开始构建固件，版本: ${{ env.LUCI_VERSION }}，分区大小: ${{ inputs.profile }}MB"
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/x86-64/imm25.config:/home/build/immortalwrt/.config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build25.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE="${{ inputs.profile }}" \
            -e CUSTOM_ROUTER_IP="${{ inputs.custom_router_ip }}" \
            immortalwrt/imagebuilder:x86-64-openwrt-${{ env.LUCI_VERSION }} /bin/bash /home/build/immortalwrt/build.sh
          
      - name: Create release info
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 📡 路由器编译完成
          - 📦 **固件版本**: ImmortalWrt ${{ env.LUCI_VERSION }} (Latest Auto)
          - 🏠 **后台地址**: \`${{ inputs.custom_router_ip }}\`
          - 👤 **用户名**: \`root\`
          - 🔑 **密码**: \`无\`
          EOF

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: Autobuild-${{ env.LUCI_VERSION }}
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
