name: 🚀 OP Arch & Profile Radar: 定制构建版

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '1. 架构 (如: ramips-mt7621, mediatek-filogic)'
        required: true
        default: 'mediatek-filogic'
      brand:
        description: '2. 品牌 (如: 京东云, 小米, asus)'
        required: false
        default: 'xiaomi'
      device_profile:
        description: '3. 型号关键词 (如: ax6000, 一代, 鲁班)'
        required: true
        default: 'ax6000'
      openwrt_version:
        description: '4. 选择主线版本'
        required: false
        default: 'Auto'
        type: choice
        options:
          - 'Auto'
          - '24.10.5'
          - '25.12.0-rc1'
      custom_version:
        description: '5. 【时光机】手动填入版本 (针对老机型如 23.05.4)'
        required: false
        default: ''
      custom_router_ip:
        description: '6. 固件默认管理 IP'
        required: true
        default: '192.168.10.1'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔍 解析版本与环境
        id: vars
        run: |
          # 优先级：手动版本 > 自动抓取 > 下拉菜单
          if [ -n "${{ inputs.custom_version }}" ]; then
            SELECTED_VER="${{ inputs.custom_version }}"
          elif [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            LATEST=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100&name=${{ inputs.arch }}-openwrt-" | \
              jq -r '.results[].name' | grep -v "SNAPSHOT" | grep -E "[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$" | sort -V | tail -n 1 | sed "s/${{ inputs.arch }}-openwrt-//")
            SELECTED_VER="${LATEST:-24.10.5}"
          else
            SELECTED_VER="${{ inputs.openwrt_version }}"
          fi
          echo "VERSION=$SELECTED_VER" >> $GITHUB_ENV

      - name: 🏗️ 执行 Docker 纠错构建
        run: |
          mkdir -p bin files
          [ -f "./build_embedded.sh" ] && sed -i 's/\r$//' ./build_embedded.sh
          
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/build_embedded.sh:/home/build/immortalwrt/build.sh" \
            -e MANAGEMENT_IP="${{ inputs.custom_router_ip }}" \
            -e TARGET_ARCH="${{ inputs.arch }}" \
            -e BRAND_INPUT="${{ inputs.brand }}" \
            -e MODEL_INPUT="${{ inputs.device_profile }}" \
            immortalwrt/imagebuilder:${{ inputs.arch }}-openwrt-${{ env.VERSION }} \
            /bin/bash /home/build/immortalwrt/build.sh

      - name: 📦 发布 Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: "${{ inputs.device_profile }}-${{ env.VERSION }}-${{ github.run_id }}"
          files: |
            bin/targets/*/*/*.bin
            bin/targets/*/*/*.img.gz
            bin/targets/*/*/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
